version: "3.8"

services:
  ipsumlogo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ipsumlogo
    restart: unless-stopped
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
